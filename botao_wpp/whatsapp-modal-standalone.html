<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal WhatsApp — Standalone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-enter { opacity: 0; transform: translateY(16px) scale(0.96); }
        .modal-enter-active { opacity: 1; transform: translateY(0) scale(1); transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-leave-active { opacity: 0; transform: translateY(16px) scale(0.96); transition: all 200ms cubic-bezier(0.4, 0, 1, 1); }
        select { background-image: none; }
    </style>
</head>
<body>

<!--
    =====================================================================
    MODAL WHATSAPP — STANDALONE
    Desenvolvido por: Gabriel Rizzato / Eleva Soluções
    =====================================================================

    COMO USAR:
    1. Copie todo este arquivo para seu projeto
    2. Edite as configurações na seção CONFIG abaixo
    3. Em qualquer botão do seu site, chame: onclick="openWaModal()"
    4. Inclua o Tailwind CSS (ou adapte as classes para seu framework)

    RASTREAMENTO AUTOMÁTICO:
    Se houver gclid, fbclid, ttclid ou msclkid na URL ou no localStorage,
    um ticket de 6 caracteres é gerado e anexado à mensagem automaticamente.
    Totalmente invisível para o usuário.
    =====================================================================
-->

<!-- =====================================================================
     BOTÃO FLUTUANTE WHATSAPP
     Posicionado no canto inferior direito da tela.
     Remova este bloco se preferir usar apenas o modal com seus próprios botões.
     ===================================================================== -->
<button id="wa-button" aria-label="Falar no WhatsApp" class="fixed bottom-5 right-5 sm:bottom-6 sm:right-6 z-40 group">
    <span class="absolute inset-0 rounded-full bg-[#25D366] animate-ping opacity-30 group-hover:opacity-40"></span>
    <span class="absolute -inset-1 rounded-full bg-[#25D366]/20 animate-pulse [animation-duration:2s]"></span>
    <span class="relative flex items-center justify-center w-[60px] h-[60px] sm:w-[64px] sm:h-[64px] bg-[#25D366] rounded-full shadow-[0_8px_24px_rgba(37,211,102,0.35)] hover:shadow-[0_12px_32px_rgba(37,211,102,0.45)] group-hover:-translate-y-0.5 group-active:translate-y-0 transition-all duration-300">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none" class="text-white translate-x-[1px]">
            <path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 0 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Zm0 23.47c-1.94 0-3.84-.52-5.5-1.5l-.39-.23-3.9 1.02 1.04-3.8-.25-.39a10.6 10.6 0 0 1-1.63-5.67c0-5.88 4.79-10.67 10.67-10.67 2.85 0 5.53 1.11 7.55 3.13a10.6 10.6 0 0 1 3.12 7.55c0 5.88-4.79 10.67-10.71 10.67Zm5.86-7.99c-.32-.16-1.89-.93-2.18-1.04-.29-.11-.5-.16-.71.16-.21.32-.82 1.04-1 1.25-.19.21-.37.24-.69.08-.32-.16-1.35-.5-2.57-1.59-.95-.84-1.59-1.89-1.78-2.21-.19-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.71-1.71-.97-2.34-.26-.62-.52-.53-.71-.54h-.61c-.21 0-.56.08-.85.4-.29.32-1.11 1.08-1.11 2.64s1.14 3.06 1.3 3.28c.16.21 2.24 3.42 5.43 4.8.76.33 1.35.52 1.81.67.76.24 1.45.21 2 .13.61-.09 1.89-.77 2.16-1.52.26-.75.26-1.39.18-1.52-.07-.13-.29-.21-.61-.37Z" fill="currentColor"/>
        </svg>
    </span>
    <span class="hidden sm:flex absolute right-[72px] top-1/2 -translate-y-1/2 whitespace-nowrap bg-slate-900 text-white text-[13px] font-medium px-3 py-2 rounded-lg shadow-lg opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 pointer-events-none">
        Fale conosco
        <span class="absolute right-[-4px] top-1/2 -translate-y-1/2 w-2 h-2 bg-slate-900 rotate-45"></span>
    </span>
</button>

<!-- =====================================================================
     MODAL WHATSAPP
     ===================================================================== -->
<div id="wa-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="wa-title">
    <div id="wa-backdrop" class="absolute inset-0 bg-slate-900/60 backdrop-blur-[6px] opacity-0 transition-opacity duration-300"></div>
    <div class="relative min-h-full flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div id="wa-dialog" class="relative w-full sm:max-w-[440px] bg-white sm:rounded-[28px] rounded-t-[28px] shadow-2xl ring-1 ring-black/5 modal-enter flex flex-col max-h-[100dvh] sm:max-h-[90vh]">

            <!-- Header -->
            <div class="relative shrink-0 px-6 pt-5 pb-5 bg-gradient-to-b from-[#0a66c2] to-[#0a5bb0] sm:rounded-t-[28px] rounded-t-[28px] overflow-hidden">
                <div class="absolute -top-20 -right-20 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
                <button id="wa-close" aria-label="Fechar" class="absolute top-4 right-4 z-10 w-8 h-8 grid place-items-center rounded-full text-white/80 hover:text-white hover:bg-white/15 transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
                <div class="relative flex items-start gap-3.5">
                    <div class="w-11 h-11 rounded-2xl bg-white/15 backdrop-blur-xl border border-white/20 grid place-items-center shrink-0 shadow-inner">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-white">
                            <path d="M12 5.5c-1.5 0-2.9.4-4.1 1.1-1.2.7-2.1 1.7-2.7 2.9-.6 1.2-.9 2.5-.8 3.8 0 1.3.4 2.6 1.1 3.7l-1 3.6 3.7-1c1 .5 2.1.8 3.2.8 1.5 0 2.9-.4 4.1-1.1 1.2-.7 2.2-1.7 2.8-2.9.6-1.2.9-2.5.8-3.8 0-1.3-.4-2.6-1.1-3.7-.7-1.1-1.7-2-2.9-2.6-1.2-.6-2.5-.8-3.8-.8h-.3Z" stroke="currentColor" stroke-width="1.5" fill="white" fill-opacity="0.15"/>
                        </svg>
                    </div>
                    <div>
                        <!-- CONFIG: título e subtítulo do modal -->
                        <h2 id="wa-title" class="text-[20px] font-semibold text-white leading-tight">Fale conosco</h2>
                        <p class="text-[13px] text-blue-100/90 mt-0.5">Atendimento via WhatsApp • Resposta rápida</p>
                    </div>
                </div>
            </div>

            <!-- Formulário -->
            <form id="wa-form" class="flex flex-col flex-1 overflow-hidden" novalidate>
                <div class="overflow-y-auto flex-1 px-6 py-4 space-y-3">
                    <div>
                        <label for="wa-nome" class="block text-[13px] font-medium text-slate-700 mb-1.5">Nome completo <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <input id="wa-nome" name="nome" type="text" autocomplete="name" placeholder="Digite seu nome" class="w-full h-[46px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10" required>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <p data-error="wa-nome" class="hidden mt-1 text-[12px] text-red-600"></p>
                    </div>
                    <div>
                        <label for="wa-telefone" class="block text-[13px] font-medium text-slate-700 mb-1.5">WhatsApp <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <input id="wa-telefone" name="telefone" type="tel" inputmode="tel" autocomplete="tel" placeholder="(00) 99999-9999" class="w-full h-[46px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10" required>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        </div>
                        <p data-error="wa-telefone" class="hidden mt-1 text-[12px] text-red-600"></p>
                    </div>
                    <div>
                        <label for="wa-motivo" class="block text-[13px] font-medium text-slate-700 mb-1.5">Motivo do contato <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <!-- CONFIG: edite as opções do select conforme o negócio -->
                            <select id="wa-motivo" name="motivo" required class="w-full h-[46px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10 appearance-none cursor-pointer">
                                <option value="" disabled selected>Selecione uma opção</option>
                                <option>Opção 1</option>
                                <option>Opção 2</option>
                                <option>Opção 3</option>
                                <option>Outro</option>
                            </select>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                        <p data-error="wa-motivo" class="hidden mt-1 text-[12px] text-red-600"></p>
                    </div>
                    <div>
                        <label for="wa-mensagem" class="block text-[13px] font-medium text-slate-700 mb-1.5">Mensagem <span class="text-slate-400 font-normal">(opcional)</span></label>
                        <textarea id="wa-mensagem" name="mensagem" rows="2" placeholder="Descreva brevemente sua dúvida..." class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10 resize-none"></textarea>
                    </div>
                    <div class="flex items-start gap-2">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="text-[#0a66c2] mt-0.5 shrink-0"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10Z" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <p class="text-[11px] leading-snug text-slate-500">Dados confidenciais. Uso exclusivo para este atendimento (LGPD).</p>
                    </div>
                </div>

                <!-- Botões -->
                <div class="shrink-0 flex gap-3 px-6 py-4 border-t border-slate-100 bg-white sm:rounded-b-[28px]">
                    <button type="button" id="wa-cancel" class="h-[46px] px-5 rounded-xl text-[14px] font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition-colors">Cancelar</button>
                    <button type="submit" id="wa-submit" class="flex-1 h-[46px] rounded-xl bg-[#25D366] hover:bg-[#20bd5a] active:bg-[#1ca655] text-white text-[15px] font-semibold shadow-[0_6px_16px_rgba(37,211,102,0.3)] hover:shadow-[0_8px_20px_rgba(37,211,102,0.4)] transition-all flex items-center justify-center gap-2 group">
                        <svg width="20" height="20" viewBox="0 0 32 32" fill="none" class="group-hover:scale-110 transition-transform"><path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 0 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Z" fill="white"/></svg>
                        Enviar no WhatsApp
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
/* Modal WhatsApp — by Gabriel Rizzato | linkedin.com/in/gabriel-rizzato | www.elevasolucoes.com */
(() => {
    console.info('%cModal WhatsApp%c by Gabriel Rizzato\nLinkedIn: linkedin.com/in/gabriel-rizzato\nSite: www.elevasolucoes.com', 'color:#25D366;font-weight:bold;font-size:13px', 'color:#555;font-size:12px');

    // =====================================================================
    // CONFIG — edite apenas esta seção para cada novo site
    // =====================================================================
    const WHATSAPP_NUMBER = '5500000000000'; // DDI + DDD + número, sem espaços
    const NOME_DESTINATARIO = 'Dr. Flávio';  // usado na saudação da mensagem
    const ORIGEM_MENSAGEM   = 'pelo site';   // "Enviado pelo site"
    // =====================================================================

    const btn       = document.getElementById('wa-button');
    const modal     = document.getElementById('wa-modal');
    const backdrop  = document.getElementById('wa-backdrop');
    const dialog    = document.getElementById('wa-dialog');
    const closeBtn  = document.getElementById('wa-close');
    const cancelBtn = document.getElementById('wa-cancel');
    const form      = document.getElementById('wa-form');
    const nome      = document.getElementById('wa-nome');
    const telefone  = document.getElementById('wa-telefone');
    const motivo    = document.getElementById('wa-motivo');
    const mensagem  = document.getElementById('wa-mensagem');

    const maskPhone = (v) => {
        v = v.replace(/\D/g, '').slice(0, 11);
        if (v.length > 10) return v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
        else if (v.length > 6) return v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
        else if (v.length > 2) return v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
        else if (v.length > 0) return v.replace(/^(\d*)/, '($1');
        return v;
    };

    telefone.addEventListener('input', (e) => { e.target.value = maskPhone(e.target.value); clearError('wa-telefone'); });
    nome.addEventListener('input', () => clearError('wa-nome'));
    motivo.addEventListener('change', () => clearError('wa-motivo'));

    const openModal = () => {
        modal.classList.remove('hidden');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        requestAnimationFrame(() => {
            backdrop.classList.remove('opacity-0');
            backdrop.classList.add('opacity-100');
            dialog.classList.remove('modal-enter');
            dialog.classList.add('modal-enter-active');
        });
        setTimeout(() => nome.focus(), 150);
    };

    const closeModal = () => {
        backdrop.classList.remove('opacity-100');
        backdrop.classList.add('opacity-0');
        dialog.classList.remove('modal-enter-active');
        dialog.classList.add('modal-leave-active');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            dialog.classList.remove('modal-leave-active');
            dialog.classList.add('modal-enter');
        }, 200);
    };

    window.openWaModal = openModal;

    if (btn) btn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.classList.contains('hidden')) closeModal(); });

    const showError = (id, msg) => {
        const input = document.getElementById(id);
        const errorEl = document.querySelector(`[data-error="${id}"]`);
        if (input) input.classList.add('!border-red-500', '!ring-4', '!ring-red-500/10', '!bg-red-50/50');
        if (errorEl) { errorEl.textContent = msg; errorEl.classList.remove('hidden'); }
    };

    const clearError = (id) => {
        const input = document.getElementById(id);
        const errorEl = document.querySelector(`[data-error="${id}"]`);
        if (input) input.classList.remove('!border-red-500', '!ring-4', '!ring-red-500/10', '!bg-red-50/50');
        if (errorEl) errorEl.classList.add('hidden');
    };

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        ['wa-nome', 'wa-telefone', 'wa-motivo'].forEach(clearError);

        const nomeVal   = nome.value.trim();
        const telVal    = telefone.value.trim();
        const motivoVal = motivo.value;
        const msgVal    = mensagem.value.trim();
        const telDigits = telVal.replace(/\D/g, '');
        let valid = true;

        if (nomeVal.length < 3)    { showError('wa-nome',     'Informe seu nome completo'); valid = false; }
        if (telDigits.length < 10) { showError('wa-telefone', 'Telefone inválido. Use (99) 99999-9999'); valid = false; }
        if (!motivoVal)            { showError('wa-motivo',   'Selecione o motivo do contato'); valid = false; }
        if (!valid) return;

        const texto = `Olá, ${NOME_DESTINATARIO}!\n\n*Nome:* ${nomeVal}\n*Telefone:* ${telVal}\n*Motivo:* ${motivoVal}\n*Mensagem:* ${msgVal || '—'}\n\nEnviado ${ORIGEM_MENSAGEM}.`;

        // Rastreamento: gclid / fbclid / ttclid / msclkid — URL ou localStorage
        const _trackingKeys = ['gclid', 'fbclid', 'ttclid', 'msclkid'];
        const _urlParams = new URLSearchParams(window.location.search);
        let _rawId = null;
        for (const k of _trackingKeys) {
            const v = _urlParams.get(k) || localStorage.getItem(k);
            if (v) { _rawId = v; break; }
        }
        const ticket = _rawId && _rawId.length > 26 ? _rawId.slice(26, 32).toUpperCase() : null;
        const textoFinal = ticket ? `${texto}\n*id: ${ticket}*` : texto;

        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(textoFinal)}`;

        const submitBtn = document.getElementById('wa-submit');
        submitBtn.innerHTML = `<svg class="animate-spin w-5 h-5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/></svg> Abrindo...`;
        submitBtn.disabled = true;

        setTimeout(() => {
            window.open(url, '_blank', 'noopener,noreferrer');
            closeModal();
            setTimeout(() => {
                form.reset();
                submitBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 32 32" fill="none" class="group-hover:scale-110 transition-transform"><path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 0 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Z" fill="white"/></svg> Enviar no WhatsApp`;
                submitBtn.disabled = false;
            }, 300);
        }, 400);
    });

    // Fix zoom em iOS ao focar inputs
    if (/iPhone|iPad/.test(navigator.userAgent)) {
        [nome, telefone, mensagem].forEach(el => {
            el.addEventListener('focus', () => document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1'));
            el.addEventListener('blur',  () => document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1'));
        });
    }
})();
</script>

</body>
</html>
