<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Dr. Flávio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Animação suave do modal */
        .modal-enter {
            opacity: 0;
            transform: translateY(16px) scale(0.96);
        }
        .modal-enter-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-leave-active {
            opacity: 0;
            transform: translateY(16px) scale(0.96);
            transition: all 200ms cubic-bezier(0.4, 0, 1, 1);
        }
        /* Esconder setas do select */
        select {
            background-image: none;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">
    
    <!-- Conteúdo demo (remova em produção) -->
    <div class="text-center max-w-lg">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#0a66c2]/10 mb-5">
            <svg width="32" height="32" viewBox="0 0 24" fill="none" class="text-[#0a66c2]">
                <path d="M12 4C7.58 4 7.03 4 10.75c0 2.17 1.15 4.1 2.94 5.37l-.7 2.54c-.1.37.25.7.61.57l2.76-1.01c.72.2 1.49.3 2.29.3 4.42 0 8-3.03 8-6.75S16.42 4 12 4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 10.75h.01M12 10.75h.01M16 10.75h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h1 class="text-2xl font-semibold text-slate-800 mb-2">Componente WhatsApp</h1>
        <p class="text-slate-500">Clique no botão verde no canto inferior direito para testar o formulário.</p>
    </div>

    <!-- BOTÃO FLUTUANTE WHATSAPP -->
    <button id="wa-button" aria-label="Falar no WhatsApp com Dr. Flávio" class="fixed bottom-5 right-5 sm:bottom-6 sm:right-6 z-40 group">
        <!-- Pulse effect -->
        <span class="absolute inset-0 rounded-full bg-[#25D366] animate-ping opacity-30 group-hover:opacity-40"></span>
        <span class="absolute -inset-1 rounded-full bg-[#25D366]/20 animate-pulse [animation-duration:2s]"></span>
        
        <!-- Button -->
        <span class="relative flex items-center justify-center w-[60px] h-[60px] sm:w-[64px] sm:h-[64px] bg-[#25D366] rounded-full shadow-[0_8px_24px_rgba(37,211,102,0.35)] hover:shadow-[0_12px_32px_rgba(37,211,102,0.45)] group-hover:-translate-y-0.5 group-active:translate-y-0 transition-all duration-300">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none" class="text-white translate-x-[1px]">
                <path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 0 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Zm0 23.47c-1.94 0-3.84-.52-5.5-1.5l-.39-.23-3.9 1.02 1.04-3.8-.25-.39a10.6 10.6 0 0 1-1.63-5.67c0-5.88 4.79-10.67 10.67-10.67 2.85 0 5.53 1.11 7.55 3.13a10.6 10.6 0 0 1 3.12 7.55c0 5.88-4.79 10.67-10.71 10.67Zm5.86-7.99c-.32-.16-1.89-.93-2.18-1.04-.29-.11-.5-.16-.71.16-.21.32-.82 1.04-1 1.25-.19.21-.37.24-.69.08-.32-.16-1.35-.5-2.57-1.59-.95-.84-1.59-1.89-1.78-2.21-.19-.32-.02-.49.14-.65.14-.14.32-.37.48-.55.16-.19.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.71-1.71-.97-2.34-.26-.62-.52-.53-.71-.54h-.61c-.21 0-.56.08-.85.4-.29.32-1.11 1.08-1.11 2.64s1.14 3.06 1.3 3.28c.16.21 2.24 3.42 5.43 4.8.76.33 1.35.52 1.81.67.76.24 1.45.21 2 .13.61-.09 1.89-.77 2.16-1.52.26-.75.26-1.39.18-1.52-.07-.13-.29-.21-.61-.37Z" fill="currentColor"/>
            </svg>
        </span>
        
        <!-- Tooltip desktop -->
        <span class="hidden sm:flex absolute right-[72px] top-1/2 -translate-y-1/2 whitespace-nowrap bg-slate-900 text-white text-[13px] font-medium px-3 py-2 rounded-lg shadow-lg opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 pointer-events-none">
            Fale com o Dr. Flávio
            <span class="absolute right-[-4px] top-1/2 -translate-y-1/2 w-2 h-2 bg-slate-900 rotate-45"></span>
        </span>
    </button>

    <!-- MODAL -->
    <div id="wa-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="wa-title">
        <!-- Backdrop -->
        <div id="wa-backdrop" class="absolute inset-0 bg-slate-900/60 backdrop-blur-[6px] opacity-0 transition-opacity duration-300"></div>
        
        <!-- Dialog -->
        <div class="relative min-h-full flex items-end sm:items-center justify-center p-0 sm:p-4">
            <div id="wa-dialog" class="relative w-full sm:max-w-[440px] bg-white sm:rounded-[28px] rounded-t-[28px] shadow-2xl ring-1 ring-black/5 modal-enter">
                
                <!-- Header -->
                <div class="relative px-6 pt-7 pb-6 bg-gradient-to-b from-[#0a66c2] to-[#0a5bb0] sm:rounded-t-[28px] rounded-t-[28px] overflow-hidden">
                    <!-- Decorative -->
                    <div class="absolute -top-20 -right-20 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-black/10 rounded-full blur-xl"></div>
                    
                    <button id="wa-close" aria-label="Fechar" class="absolute top-4 right-4 w-8 h-8 grid place-items-center rounded-full text-white/80 hover:text-white hover:bg-white/15 transition-colors">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                    
                    <div class="relative flex items-start gap-3.5">
                        <div class="w-12 h-12 rounded-2xl bg-white/15 backdrop-blur-xl border border-white/20 grid place-items-center shrink-0 shadow-inner">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-white">
                                <path d="M12 5.5c-1.5 0-2.9.4-4.1 1.1-1.2.7-2.1 1.7-2.7 2.9-.6 1.2-.9 2.5-.8 3.8 0 1.3.4 2.6 1.1 3.7l-1 3.6 3.7-1c1 .5 2.1.8 3.2.8 1.5 0 2.9-.4 4.1-1.1 1.2-.7 2.2-1.7 2.8-2.9.6-1.2.9-2.5.8-3.8 0-1.3-.4-2.6-1.1-3.7-.7-1.1-1.7-2-2.9-2.6-1.2-.6-2.5-0.8-3.8-.8h-.3Z" stroke="currentColor" stroke-width="1.5" fill="white" fill-opacity="0.15"/>
                            </svg>
                        </div>
                        <div>
                            <h2 id="wa-title" class="text-[22px] font-semibold text-white leading-tight">Fale com o Dr. Flávio</h2>
                            <p class="text-[14px] text-blue-100/90 mt-0.5">Atendimento via WhatsApp • Resposta rápida</p>
                        </div>
                    </div>
                </div>

                <!-- Form -->
                <form id="wa-form" class="px-6 py-6 space-y-4" novalidate>
                    <!-- Nome -->
                    <div>
                        <label for="wa-nome" class="block text-[13px] font-medium text-slate-700 mb-1.5">
                            Nome completo <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <input id="wa-nome" name="nome" type="text" autocomplete="name" placeholder="Digite seu nome" class="w-full h-[48px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10" required>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <p data-error="wa-nome" class="hidden mt-1.5 text-[12px] text-red-600"></p>
                    </div>

                    <!-- Telefone -->
                    <div>
                        <label for="wa-telefone" class="block text-[13px] font-medium text-slate-700 mb-1.5">
                            WhatsApp <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <input id="wa-telefone" name="telefone" type="tel" inputmode="tel" autocomplete="tel" placeholder="(62) 99999-9999" class="w-full h-[48px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10" required>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        </div>
                        <p data-error="wa-telefone" class="hidden mt-1.5 text-[12px] text-red-600"></p>
                    </div>

                    <!-- Motivo -->
                    <div>
                        <label for="wa-motivo" class="block text-[13px] font-medium text-slate-700 mb-1.5">
                            Motivo do contato <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <select id="wa-motivo" name="motivo" required class="w-full h-[48px] px-4 pr-10 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10 appearance-none cursor-pointer">
                                <option value="" disabled selected>Selecione uma opção</option>
                                <option>Cirurgia Robótica</option>
                                <option>Consulta Particular Online</option>
                                <option>Consulta Particular Presencial</option>
                                <option>Consulta Plano de Saúde</option>
                                <option>Outro</option>
                            </select>
                            <svg class="absolute right-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                        </div>
                        <p data-error="wa-motivo" class="hidden mt-1.5 text-[12px] text-red-600"></p>
                    </div>

                    <!-- Mensagem -->
                    <div>
                        <label for="wa-mensagem" class="block text-[13px] font-medium text-slate-700 mb-1.5">
                            Mensagem adicional <span class="text-slate-400 font-normal">(opcional)</span>
                        </label>
                        <textarea id="wa-mensagem" name="mensagem" rows="3" placeholder="Descreva brevemente sua dúvida..." class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 text-[15px] text-slate-900 placeholder-slate-400 outline-none transition-all focus:bg-white focus:border-[#0a66c2] focus:ring-4 focus:ring-[#0a66c2]/10 resize-none"></textarea>
                    </div>

                    <!-- Aviso -->
                    <div class="flex items-start gap-2.5 pt-1">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="text-[#0a66c2] mt-0.5 shrink-0"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 6.477 2 12s4.477 10 10 10Z" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        <p class="text-[12px] leading-snug text-slate-500">Seus dados são confidenciais e serão usados apenas para este atendimento, conforme a LGPD.</p>
                    </div>

                    <!-- Botões -->
                    <div class="flex gap-3 pt-2">
                        <button type="button" id="wa-cancel" class="h-[48px] px-5 rounded-xl text-[14px] font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-100 transition-colors">
                            Cancelar
                        </button>
                        <button type="submit" id="wa-submit" class="flex-1 h-[48px] rounded-xl bg-[#25D366] hover:bg-[#20bd5a] active:bg-[#1ca655] text-white text-[15px] font-semibold shadow-[0_6px_16px_rgba(37,211,102,0.3)] hover:shadow-[0_8px_20px_rgba(37,211,102,0.4)] transition-all flex items-center justify-center gap-2 group">
                            <svg width="20" height="20" viewBox="0 0 32 32" fill="none" class="group-hover:scale-110 transition-transform"><path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Z" fill="white"/></svg>
                            Enviar no WhatsApp
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const WHATSAPP_NUMBER = '556232387800';
            
            const btn = document.getElementById('wa-button');
            const modal = document.getElementById('wa-modal');
            const backdrop = document.getElementById('wa-backdrop');
            const dialog = document.getElementById('wa-dialog');
            const closeBtn = document.getElementById('wa-close');
            const cancelBtn = document.getElementById('wa-cancel');
            const form = document.getElementById('wa-form');
            
            const nome = document.getElementById('wa-nome');
            const telefone = document.getElementById('wa-telefone');
            const motivo = document.getElementById('wa-motivo');
            const mensagem = document.getElementById('wa-mensagem');

            // Máscara telefone BR
            const maskPhone = (v) => {
                v = v.replace(/\D/g, '').slice(0, 11);
                if (v.length > 10) {
                    return v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
                } else if (v.length > 6) {
                    return v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
                } else if (v.length > 2) {
                    return v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
                } else if (v.length > 0) {
                    return v.replace(/^(\d*)/, '($1');
                }
                return v;
            };

            telefone.addEventListener('input', (e) => {
                e.target.value = maskPhone(e.target.value);
                clearError('wa-telefone');
            });

            nome.addEventListener('input', () => clearError('wa-nome'));
            motivo.addEventListener('change', () => clearError('wa-motivo'));

            // Abrir modal
            const openModal = () => {
                modal.classList.remove('hidden');
                modal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                
                requestAnimationFrame(() => {
                    backdrop.classList.remove('opacity-0');
                    backdrop.classList.add('opacity-100');
                    dialog.classList.remove('modal-enter');
                    dialog.classList.add('modal-enter-active');
                });
                
                setTimeout(() => nome.focus(), 150);
            };

            // Fechar modal
            const closeModal = () => {
                backdrop.classList.remove('opacity-100');
                backdrop.classList.add('opacity-0');
                dialog.classList.remove('modal-enter-active');
                dialog.classList.add('modal-leave-active');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.setAttribute('aria-hidden', 'true');
                    document.body.style.overflow = '';
                    dialog.classList.remove('modal-leave-active');
                    dialog.classList.add('modal-enter');
                }, 200);
            };

            btn.addEventListener('click', openModal);
            closeBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);

            // ESC fecha
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            });

            // Erros
            const showError = (id, msg) => {
                const input = document.getElementById(id);
                const errorEl = document.querySelector(`[data-error="${id}"]`);
                if (input) {
                    input.classList.add('!border-red-500', '!ring-4', '!ring-red-500/10', '!bg-red-50/50');
                }
                if (errorEl) {
                    errorEl.textContent = msg;
                    errorEl.classList.remove('hidden');
                }
            };

            const clearError = (id) => {
                const input = document.getElementById(id);
                const errorEl = document.querySelector(`[data-error="${id}"]`);
                if (input) {
                    input.classList.remove('!border-red-500', '!ring-4', '!ring-red-500/10', '!bg-red-50/50');
                }
                if (errorEl) {
                    errorEl.classList.add('hidden');
                }
            };

            const clearAllErrors = () => {
                ['wa-nome', 'wa-telefone', 'wa-motivo'].forEach(clearError);
            };

            // Submit
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                clearAllErrors();

                const nomeVal = nome.value.trim();
                const telVal = telefone.value.trim();
                const motivoVal = motivo.value;
                const msgVal = mensagem.value.trim();
                const telDigits = telVal.replace(/\D/g, '');

                let valid = true;

                if (nomeVal.length < 3) {
                    showError('wa-nome', 'Informe seu nome completo');
                    valid = false;
                }
                if (telDigits.length < 10) {
                    showError('wa-telefone', 'Telefone inválido. Use (99) 99999-9999');
                    valid = false;
                }
                if (!motivoVal) {
                    showError('wa-motivo', 'Selecione o motivo do contato');
                    valid = false;
                }

                if (!valid) return;

                // Montar mensagem
                const texto = `Olá, Dr. Flávio!

*Nome:* ${nomeVal}
*Telefone:* ${telVal}
*Motivo:* ${motivoVal}
*Mensagem:* ${msgVal || '—'}

Enviado pelo site.`;

                const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(texto)}`;
                
                // Feedback visual
                const submitBtn = document.getElementById('wa-submit');
                submitBtn.innerHTML = `<svg class="animate-spin w-5 h-5" viewBox="0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/></svg> Abrindo...`;
                submitBtn.disabled = true;

                setTimeout(() => {
                    window.open(url, '_blank', 'noopener,noreferrer');
                    closeModal();
                    
                    // Reset
                    setTimeout(() => {
                        form.reset();
                        submitBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 32 32" fill="none" class="group-hover:scale-110 transition-transform"><path d="M16.003 3.2c-7.07 0-12.8 5.73-12.8 0 2.26.59 4.46 1.71 6.4L3.2 28.8l6.57-1.72a12.74 12.74 0 6.24 1.59h.01c7.07 0 12.8-5.73 12.8-12.8S23.073 3.2 16.003 3.2Z" fill="white"/></svg> Enviar no WhatsApp`;
                        submitBtn.disabled = false;
                    }, 300);
                }, 400);
            });

            // Prevenir zoom no iOS ao focar
            if (/iPhone|iPad/.test(navigator.userAgent)) {
                [nome, telefone, mensagem].forEach(el => {
                    el.addEventListener('focus', () => {
                        document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1, maximum-scale=1');
                    });
                    el.addEventListener('blur', () => {
                        document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1');
                    });
                });
            }
        })();
    </script>
</body>
</html>
